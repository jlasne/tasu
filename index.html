<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tasu</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'void-dark': '#1f1f1f',
                        'void-darker': '#121212',
                        'off-white': '#dedddc',
                        'bitcoin-orange': '#F7931A',
                        'dark-red': '#8B0000',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center">

    <!-- Login Container -->
    <div
        class="w-full max-w-md p-8 space-y-6 bg-void-darker/60 backdrop-blur-xl border border-white/10 rounded-2xl text-center">
        <div class="flex items-center justify-center gap-2 mb-4">
            <img src="assets/logo.png" alt="Tasu Logo" class="w-10 h-10 rounded-lg object-contain" />
            <span class="text-2xl font-bold text-off-white font-sans">Tasu</span>
        </div>

        <h2 class="text-2xl font-bold text-off-white">Welcome Back</h2>
        <p class="text-gray-400">Sign in to access your dashboard</p>

        <div class="space-y-4">
            <input type="email" id="email-input" placeholder="Email"
                class="w-full px-4 py-3 bg-void-dark/95 backdrop-blur-sm border border-white/10 rounded-lg text-off-white focus:border-bitcoin-orange outline-none" />
            <input type="password" id="password-input" placeholder="Password"
                class="w-full px-4 py-3 bg-void-dark/95 backdrop-blur-sm border border-white/10 rounded-lg text-off-white focus:border-bitcoin-orange outline-none" />
            <p id="auth-error" class="text-red-500 text-sm"></p>

            <div class="flex gap-4">
                <button id="email-login-btn"
                    class="flex-1 py-3 font-semibold text-off-white bg-white/10 rounded-lg hover:bg-white/20 transition-all">Login</button>
                <button id="email-signup-btn"
                    class="flex-1 py-3 font-semibold text-off-white bg-white/10 rounded-lg hover:bg-white/20 transition-all">Sign
                    Up</button>
            </div>
        </div>

        <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-white/10"></div>
            </div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-void-darker text-gray-500">Or
                    continue with</span></div>
        </div>

        <button id="google-login-btn"
            class="w-full py-3 font-semibold text-black bg-white rounded-lg hover:bg-gray-200 transition-all">
            Sign in with Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from "./config/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const authError = document.getElementById('auth-error');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const emailLoginBtn = document.getElementById('email-login-btn');
        const emailSignupBtn = document.getElementById('email-signup-btn');

        // Check if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Register/Login with backend
                try {
                    const token = await user.getIdToken();
                    const response = await fetch('https://api.tasu.ai/register.php', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        window.location.href = 'dashboard/';
                    } else {
                        console.error('Backend registration failed');
                        window.location.href = 'dashboard/';
                    }
                } catch (e) {
                    console.error('Error registering with backend:', e);
                    window.location.href = 'dashboard/';
                }
            }
        });

        // Google Login
        googleLoginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .catch((error) => {
                    console.error("Login Failed", error);
                    authError.innerText = error.message;
                });
        });

        // Email Login
        emailLoginBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    authError.innerText = error.message;
                });
        });

        // Email Signup
        emailSignupBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            createUserWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    authError.innerText = error.message;
                });
        });
    </script>

    <!-- Tasu SDK -->
    <script src="sdk/tasu-sdk.js"></script>
</body>

</html>
