<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tasu</title>
    <link rel="icon" type="image/png" href="assets/logo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        background: '#0a0a0a',
                        surface: '#1a1a1a',
                        border: '#2a2a2a',
                        primary: {
                            DEFAULT: '#f97316',
                            hover: '#ea580c',
                        },
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #0a0a0a 75%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(42, 42, 42, 0.8);
        }

        .input-field {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-12 h-12 bg-gradient-to-br from-red-600 to-orange-500 rounded-lg flex items-center justify-center mb-4 shadow-lg">
                <img src="assets/logo.png" alt="Tasu" class="w-8 h-8 object-contain brightness-0 invert" />
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Welcome back</h1>
            <p class="text-gray-400 text-sm mt-2">Sign in to your dashboard</p>
        </div>

        <!-- Error Message -->
        <div id="auth-error"
            class="hidden mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">
        </div>

        <!-- Form -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
                <input type="email" id="email-input" placeholder="name@company.com"
                    class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-600 text-sm">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" id="password-input" placeholder="••••••••"
                    class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-600 text-sm">
            </div>

            <button id="email-login-btn"
                class="btn-primary w-full py-2.5 rounded-lg text-white font-medium text-sm shadow-lg shadow-orange-500/20">
                Sign In
            </button>

            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-800"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-[#131313] px-2 text-gray-500">Or continue with</span>
                </div>
            </div>

            <button id="google-login-btn"
                class="w-full py-2.5 rounded-lg bg-white text-black font-medium text-sm hover:bg-gray-100 transition-colors flex items-center justify-center gap-2">
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Google
            </button>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-400">
                Don't have an account?
                <button id="toggle-auth-mode"
                    class="text-orange-500 hover:text-orange-400 font-medium transition-colors">Sign up</button>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "REDACTED_FIREBASE_KEY",
            authDomain: "tasu-44e26.firebaseapp.com",
            projectId: "tasu-44e26",
            storageBucket: "tasu-44e26.firebasestorage.app",
            messagingSenderId: "645411072706",
            appId: "1:645411072706:web:ee2547ba4080f6ea70295b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // UI Elements
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const authError = document.getElementById('auth-error');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const emailLoginBtn = document.getElementById('email-login-btn');
        const toggleAuthBtn = document.getElementById('toggle-auth-mode');

        let isSignup = false;

        // Auth Guard
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Check if user doc exists, if not create it (for Google Sign In)
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);

                if (!userDoc.exists()) {
                    await createUserDocument(user);
                }

                window.location.href = 'dashboard/';
            }
        });

        async function createUserDocument(user) {
            const projectId = crypto.randomUUID();
            await setDoc(doc(db, 'users', user.uid), {
                email: user.email,
                projectId: projectId,
                plan: 'Starter Plan',
                createdAt: new Date().toISOString(),
                eventsUsed: 0,
                eventLimit: 10000
            });
        }

        function showError(message) {
            authError.textContent = message.replace('Firebase: ', '');
            authError.classList.remove('hidden');
            setTimeout(() => authError.classList.add('hidden'), 5000);
        }

        // Toggle Login/Signup
        toggleAuthBtn.addEventListener('click', () => {
            isSignup = !isSignup;
            const title = document.querySelector('h1');
            const subtitle = document.querySelector('p.text-gray-400');
            const btnText = emailLoginBtn;
            const toggleText = toggleAuthBtn;
            const footerText = toggleAuthBtn.parentElement.firstChild;

            if (isSignup) {
                title.textContent = 'Create an account';
                subtitle.textContent = 'Start tracking your analytics today';
                btnText.textContent = 'Sign Up';
                footerText.textContent = 'Already have an account? ';
                toggleText.textContent = 'Sign in';
            } else {
                title.textContent = 'Welcome back';
                subtitle.textContent = 'Sign in to your dashboard';
                btnText.textContent = 'Sign In';
                footerText.textContent = "Don't have an account? ";
                toggleText.textContent = 'Sign up';
            }
            authError.classList.add('hidden');
        });

        // Email Auth
        emailLoginBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            emailLoginBtn.disabled = true;
            emailLoginBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                if (isSignup) {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await createUserDocument(userCredential.user);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error(error);
                showError(error.message);
                emailLoginBtn.disabled = false;
                emailLoginBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });

        // Google Login
        googleLoginBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error(error);
                showError(error.message);
            }
        });
    </script>
</body>

</html>
