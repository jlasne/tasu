<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Tasu</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        background: '#0a0a0a',
                        surface: '#1a1a1a',
                        border: '#2a2a2a',
                        primary: {
                            DEFAULT: '#f97316',
                            hover: '#ea580c',
                        },
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(42, 42, 42, 0.8);
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
        }

        .input-field {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            transition: all 0.2s ease;
        }

        .input-field:disabled {
            background: #151515;
            color: #666;
            cursor: not-allowed;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            transition: all 0.2s ease;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>

<body class="min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="glass-nav fixed top-0 w-full z-50">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <a href="../" class="flex items-center gap-2">
                    <div
                        class="w-8 h-8 bg-gradient-to-br from-red-600 to-orange-500 rounded-lg flex items-center justify-center shadow-lg">
                        <img src="../assets/logo.png" alt="Tasu" class="w-5 h-5 object-contain brightness-0 invert" />
                    </div>
                    <span class="text-lg font-bold tracking-tight">Tasu</span>
                </a>

                <div class="hidden md:flex items-center gap-1">
                    <a href="../dashboard/"
                        class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 rounded-md transition-all">Dashboard</a>
                    <a href="../integration/"
                        class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 rounded-md transition-all">Integration</a>
                    <a href="."
                        class="px-4 py-2 text-sm font-medium text-white bg-white/5 rounded-md border border-white/10">Settings</a>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <span id="user-email-nav" class="hidden md:block text-xs text-gray-500 font-mono"></span>
                <button id="logout-btn" class="text-sm font-medium text-gray-400 hover:text-red-400 transition-colors">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 pt-24 max-w-3xl">
        <h1 class="text-2xl font-bold mb-8">Account Settings</h1>

        <div class="space-y-6">

            <!-- Account Info -->
            <div class="card p-6">
                <h2 class="text-lg font-semibold mb-4">Account Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Email Address</label>
                        <div id="account-email"
                            class="text-sm font-mono text-white bg-[#0f0f0f] px-4 py-2.5 rounded-lg border border-[#2a2a2a]">
                            Loading...
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">User ID</label>
                        <div id="user-id"
                            class="text-sm font-mono text-gray-500 bg-[#0f0f0f] px-4 py-2.5 rounded-lg border border-[#2a2a2a] truncate">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Subscription -->
            <div class="card p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold">Subscription Plan</h2>
                    <span id="current-plan"
                        class="px-3 py-1 bg-orange-500/10 text-orange-400 border border-orange-500/20 rounded-full text-xs font-medium">Starter
                        Plan</span>
                </div>

                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-400">Events Usage</span>
                        <span id="events-used" class="text-white font-mono">0 / 10,000</span>
                    </div>
                    <div class="h-2 w-full bg-[#2a2a2a] rounded-full overflow-hidden">
                        <div id="usage-bar"
                            class="h-full bg-gradient-to-r from-orange-500 to-red-500 w-0 transition-all duration-1000">
                        </div>
                    </div>
                </div>

                <button
                    class="text-sm text-gray-400 hover:text-white underline decoration-gray-600 hover:decoration-white transition-all">
                    Upgrade Plan
                </button>
            </div>

            <!-- Change Email (Disabled) -->
            <div class="card p-6 opacity-60">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-400">Change Email</h2>
                    <span
                        class="px-2 py-1 bg-[#2a2a2a] text-gray-500 border border-[#333] rounded text-[10px] uppercase tracking-wider">Coming
                        Soon</span>
                </div>
                <div class="space-y-4">
                    <input type="email" placeholder="New email address" disabled
                        class="input-field w-full px-4 py-2.5 rounded-lg text-sm">
                    <button disabled
                        class="w-full py-2.5 rounded-lg bg-[#2a2a2a] text-gray-600 font-medium text-sm cursor-not-allowed border border-[#333]">Update
                        Email</button>
                </div>
            </div>

            <!-- Change Password (Disabled) -->
            <div class="card p-6 opacity-60">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-400">Change Password</h2>
                    <span
                        class="px-2 py-1 bg-[#2a2a2a] text-gray-500 border border-[#333] rounded text-[10px] uppercase tracking-wider">Coming
                        Soon</span>
                </div>
                <div class="space-y-4">
                    <input type="password" placeholder="Current password" disabled
                        class="input-field w-full px-4 py-2.5 rounded-lg text-sm">
                    <input type="password" placeholder="New password" disabled
                        class="input-field w-full px-4 py-2.5 rounded-lg text-sm">
                    <button disabled
                        class="w-full py-2.5 rounded-lg bg-[#2a2a2a] text-gray-600 font-medium text-sm cursor-not-allowed border border-[#333]">Update
                        Password</button>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="card p-6 border-red-900/30 bg-red-900/5">
                <h2 class="text-lg font-semibold text-red-500 mb-2">Danger Zone</h2>
                <p class="text-sm text-gray-400 mb-6">Once you delete your account, there is no going back. Please be
                    certain.</p>

                <button id="delete-account-btn" class="btn-danger px-6 py-2.5 rounded-lg font-medium text-sm">
                    Delete Account
                </button>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "REDACTED_FIREBASE_KEY",
            authDomain: "tasu-44e26.firebaseapp.com",
            projectId: "tasu-44e26",
            storageBucket: "tasu-44e26.firebasestorage.app",
            messagingSenderId: "645411072706",
            appId: "1:645411072706:web:ee2547ba4080f6ea70295b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Guard & Init
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../';
                return;
            }

            // Update UI
            document.getElementById('user-email-nav').textContent = user.email;
            document.getElementById('account-email').textContent = user.email;
            document.getElementById('user-id').textContent = user.uid;

            try {
                // Load Plan Info
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('current-plan').textContent = data.plan || 'Starter Plan';

                    const used = data.eventsUsed || 0;
                    const limit = data.eventLimit || 10000;
                    document.getElementById('events-used').textContent = `${used.toLocaleString()} / ${limit.toLocaleString()}`;

                    // Update usage bar
                    const percentage = Math.min((used / limit) * 100, 100);
                    document.getElementById('usage-bar').style.width = `${percentage}%`;
                }
            } catch (error) {
                console.error("Error fetching user data:", error);
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'https://tasu.ai');
        });

        // Delete Account
        document.getElementById('delete-account-btn').addEventListener('click', async () => {
            if (confirm('Are you ABSOLUTELY sure? This cannot be undone!')) {
                const password = prompt('Please type "DELETE" to confirm:');
                if (password === 'DELETE') {
                    try {
                        const user = auth.currentUser;
                        // Delete Firestore Data
                        await deleteDoc(doc(db, 'users', user.uid));
                        // Delete Auth User
                        await deleteUser(user);

                        alert('Account deleted successfully');
                        window.location.href = 'https://tasu.ai';
                    } catch (error) {
                        console.error("Error deleting account:", error);
                        alert('Error deleting account: ' + error.message);
                    }
                }
            }
        });
    </script>
</body>

</html>
