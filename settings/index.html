<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Tasu</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            border-radius: 0 !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f1f1f;
            color: #f0f0f0;
        }
    </style>
</head>

<body class="min-h-screen" style="background-color: #1f1f1f;">

    <!-- Top Navigation -->
    <nav class="border-b border-gray-700" style="background-color: #1f1f1f;">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="../" class="flex items-center gap-2">
                    <img src="../assets/logo.png" alt="Tasu Logo" class="w-8 h-8 object-contain" />
                    <span class="text-xl font-bold font-sans" style="color: #f0f0f0;">Tasu</span>
                </a>
            </div>

            <div class="flex items-center gap-3">
                <span id="user-email" class="text-sm text-gray-400"></span>
                <a href="../dashboard/"
                    class="px-4 py-2 text-sm font-semibold border border-gray-700 hover:bg-gray-800 transition-all"
                    style="color: #f0f0f0;">Dashboard</a>
                <a href="../integration/"
                    class="px-4 py-2 text-sm font-semibold border border-gray-700 hover:bg-gray-800 transition-all"
                    style="color: #f0f0f0;">Integration</a>
                <a href="." class="px-4 py-2 text-sm font-semibold border"
                    style="background-color: #8B0000; color: #f0f0f0; border-color: #8B0000;">Settings</a>
                <button id="logout-btn" class="px-4 py-2 text-sm font-semibold border transition-all"
                    style="color: #8B0000; border-color: #8B0000; background-color: transparent;">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold mb-8" style="color: #f0f0f0;">Settings</h1>

        <!-- Account Info -->
        <div class="border border-gray-700 p-6 mb-6" style="background-color: #1f1f1f;">
            <h2 class="text-xl font-bold mb-4" style="color: #f0f0f0;">Account Information</h2>
            <div class="space-y-3">
                <div>
                    <p class="text-sm text-gray-400">Email</p>
                    <p id="current-email" class="font-mono" style="color: #f0f0f0;"></p>
                </div>
            </div>
        </div>

        <!-- Billing & Plan -->
        <div class="border border-gray-700 p-6 mb-6" style="background-color: #1f1f1f;">
            <h2 class="text-xl font-bold mb-4" style="color: #f0f0f0;">Subscription & Usage</h2>
            <div class="space-y-4">
                <div>
                    <p class="text-sm text-gray-400">Current Plan</p>
                    <p id="current-plan" class="font-semibold" style="color: #f0f0f0;">Starter Plan</p>
                </div>
                <div>
                    <p class="text-sm text-gray-400">Monthly Events Used</p>
                    <div class="flex items-center gap-3">
                        <div class="flex-1 border border-gray-700" style="background-color: #2a2a2a; height: 8px;">
                            <div id="usage-bar" style="background-color: #F7931A; height: 8px; width: 0%;"></div>
                        </div>
                        <p id="usage-text" class="text-sm" style="color: #f0f0f0;">0 / 10,000</p>
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button id="upgrade-btn" class="px-6 py-2 font-semibold border transition-all"
                        style="background-color: #F7931A; color: #000000; border-color: #F7931A;">
                        Upgrade Plan
                    </button>
                    <button id="cancel-btn" class="px-6 py-2 font-semibold border border-gray-700 transition-all"
                        style="color: #f0f0f0; background-color: transparent;">
                        Cancel Subscription
                    </button>
                </div>
            </div>
        </div>

        <!-- Change Email -->
        <div class="border border-gray-700 p-6 mb-6" style="background-color: #1f1f1f;">
            <h2 class="text-xl font-bold mb-4" style="color: #f0f0f0;">
                Change Email
                <span class="text-xs px-2 py-1 border border-gray-600 ml-2"
                    style="color: #888; font-weight: normal;">Coming Soon</span>
            </h2>
            <form id="email-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">New Email</label>
                    <input type="email" id="new-email-input" placeholder="new@example.com" disabled disabled
                        class="w-full px-4 py-3 border border-gray-700 outline-none"
                        style="background-color: #2a2a2a; color: #666; cursor: not-allowed;" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Current Password (for
                        verification)</label>
                    <input type="password" id="email-password-input" placeholder=""
                        class="w-full px-4 py-3 border border-gray-700 outline-none"
                        style="background-color: #2a2a2a; color: #666; cursor: not-allowed;" />
                </div>
                <button type="submit" class="px-6 py-3 font-semibold border transition-all" disabled
                    style="background-color: #3a3a3a; color: #666; border-color: #555; cursor: not-allowed;">
                    Update Email
                </button>
            </form>
            <p id="email-message" class="mt-2 text-sm"></p>
        </div>

        <!-- Change Password -->
        <div class="border border-gray-700 p-6 mb-6" style="background-color: #1f1f1f;">
            <h2 class="text-xl font-bold mb-4" style="color: #f0f0f0;">
                Change Password 
                <span class="text-xs px-2 py-1 border border-gray-600 ml-2" style="color: #888; font-weight: normal;">Coming Soon</span>
            </h2>
            <form id="password-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Current Password</label>
                    <input type="password" id="current-password-input" placeholder=""
                        class="w-full px-4 py-3 border border-gray-700 outline-none"
                        style="background-color: #2a2a2a; color: #666; cursor: not-allowed;" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">New Password</label>
                    <input type="password" id="new-password-input" placeholder=""
                        class="w-full px-4 py-3 border border-gray-700 outline-none"
                        style="background-color: #2a2a2a; color: #666; cursor: not-allowed;" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Confirm New Password</label>
                    <input type="password" id="confirm-password-input" placeholder=""
                        class="w-full px-4 py-3 border border-gray-700 outline-none"
                        style="background-color: #2a2a2a; color: #666; cursor: not-allowed;" />
                </div>
                <button type="submit" class="px-6 py-3 font-semibold border transition-all" disabled
                    style="background-color: #3a3a3a; color: #666; border-color: #555; cursor: not-allowed;">
                    Update Password
                </button>
            </form>
            <p id="password-message" class="mt-2 text-sm"></p>
        </div>

        <!-- Danger Zone -->
        <div class="border p-6" style="background-color: #1f1f1f; border-color: #8B0000;">
            <h2 class="text-xl font-bold mb-4" style="color: #8B0000;">Danger Zone</h2>
            <div class="flex gap-3">
                <button id="delete-account-btn" class="px-6 py-2 font-semibold border transition-all"
                    style="background-color: #8B0000; color: #ffffff; border-color: #8B0000;">
                    Delete Account
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from "../config/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let currentUser = null;

        // Auth check
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '../';
            } else {
                currentUser = user;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('current-email').innerText = user.email;
                loadPlanInfo();
            }
        });

        // Load plan info (mock - replace with real data)
        function loadPlanInfo() {
            const mockUsage = 1250;
            const mockLimit = 10000;
            const percentage = (mockUsage / mockLimit) * 100;

            document.getElementById('usage-bar').style.width = percentage + '%';
            document.getElementById('usage-text').innerText = `${mockUsage.toLocaleString()} / ${mockLimit.toLocaleString()}`;
        }

        // Logout - redirect to https://tasu.ai
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'https://tasu.ai';
            });
        });

        // Upgrade plan
        document.getElementById('upgrade-btn').addEventListener('click', () => {
            alert('Redirect to Stripe billing portal or upgrade flow');
        });

        // Cancel subscription
        document.getElementById('cancel-btn').addEventListener('click', () => {
            if (confirm('Are you sure you want to cancel your subscription?')) {
                alert('Redirect to Stripe portal to cancel subscription');
            }
        });

        // Delete account
        document.getElementById('delete-account-btn').addEventListener('click', async () => {
            if (confirm('Are you ABSOLUTELY sure? This cannot be undone!')) {
                const password = prompt('Enter your password to confirm deletion:');
                if (password) {
                    try {
                        const credential = EmailAuthProvider.credential(currentUser.email, password);
                        await reauthenticateWithCredential(currentUser, credential);
                        await deleteUser(currentUser);
                        alert('Account deleted successfully');
                        window.location.href = 'https://tasu.ai';
                    } catch (error) {
                        alert('Error deleting account: ' + error.message);
                    }
                }
            }
        });

        // Change Email
        document.getElementById('email-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newEmail = document.getElementById('new-email-input').value.trim();
            const password = document.getElementById('email-password-input').value;
            const messageEl = document.getElementById('email-message');

            if (!newEmail || !password) {
                messageEl.innerText = '? Please fill in all fields';
                messageEl.style.color = '#F7931A';
                return;
            }

            try {
                const credential = EmailAuthProvider.credential(currentUser.email, password);
                await reauthenticateWithCredential(currentUser, credential);
                await updateEmail(currentUser, newEmail);
                messageEl.innerText = '? Email updated successfully!';
                messageEl.style.color = '#4ade80';
                document.getElementById('current-email').innerText = newEmail;
                document.getElementById('email-form').reset();
                setTimeout(() => { messageEl.innerText = ''; }, 3000);
            } catch (error) {
                messageEl.innerText = `? ${error.message}`;
                messageEl.style.color = '#8B0000';
            }
        });

        // Change Password
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('current-password-input').value;
            const newPassword = document.getElementById('new-password-input').value;
            const confirmPassword = document.getElementById('confirm-password-input').value;
            const messageEl = document.getElementById('password-message');

            if (!currentPassword || !newPassword || !confirmPassword) {
                messageEl.innerText = '? Please fill in all fields';
                messageEl.style.color = '#F7931A';
                return;
            }

            if (newPassword !== confirmPassword) {
                messageEl.innerText = '? New passwords do not match';
                messageEl.style.color = '#F7931A';
                return;
            }

            if (newPassword.length < 6) {
                messageEl.innerText = '? Password must be at least 6 characters';
                messageEl.style.color = '#F7931A';
                return;
            }

            try {
                const credential = EmailAuthProvider.credential(currentUser.email, currentPassword);
                await reauthenticateWithCredential(currentUser, credential);
                await updatePassword(currentUser, newPassword);
                messageEl.innerText = '? Password updated successfully!';
                messageEl.style.color = '#4ade80';
                document.getElementById('password-form').reset();
                setTimeout(() => { messageEl.innerText = ''; }, 3000);
            } catch (error) {
                messageEl.innerText = `? ${error.message}`;
                messageEl.style.color = '#8B0000';
            }
        });
    </script>

    <!-- Tasu SDK -->
    <script src="../sdk/tasu-sdk.js"></script>
</body>

</html>
