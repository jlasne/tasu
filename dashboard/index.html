<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Tasu</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            border-radius: 0 !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1f1f1f;
            color: #f0f0f0;
        }
    </style>
</head>

<body class="min-h-screen" style="background-color: #1f1f1f;">

    <!-- Top Navigation -->
    <nav class="border-b border-gray-700" style="background-color: #1f1f1f;">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="../assets/logo.png" alt="Tasu Logo" class="w-8 h-8 object-contain" />
                <span class="text-xl font-bold font-sans" style="color: #f0f0f0;">Tasu</span>
            </div>

            <div class="flex items-center gap-3">
                <span id="user-email" class="text-sm text-gray-400"></span>
                <a href="." class="px-4 py-2 text-sm font-semibold border"
                    style="background-color: #8B0000; color: #f0f0f0; border-color: #8B0000;">Dashboard</a>
                <a href="../integration/"
                    class="px-4 py-2 text-sm font-semibold border border-gray-700 hover:bg-gray-800 transition-all"
                    style="color: #f0f0f0;">Integration</a>
                <a href="../settings/"
                    class="px-4 py-2 text-sm font-semibold border border-gray-700 hover:bg-gray-800 transition-all"
                    style="color: #f0f0f0;">Settings</a>
                <button id="logout-btn" class="px-4 py-2 text-sm font-semibold border transition-all"
                    style="color: #8B0000; border-color: #8B0000; background-color: transparent;">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <main class="container mx-auto px-6 py-8">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold" style="color: #f0f0f0;">Dashboard</h1>
        </div>

        <!-- Top Section: Chart + Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <!-- Left: Dual Chart (2/3 width) -->
            <div class="lg:col-span-2 border border-gray-700 p-6" style="background-color: #1f1f1f;">
                <h2 class="text-lg font-bold mb-4" style="color: #f0f0f0;">Total Views</h2>
                <canvas id="views-chart" height="100"></canvas>
            </div>

            <!-- Right: Stats Column (1/3 width) -->
            <div class="space-y-6">
                <!-- Compact Stats Group -->
                <div class="border border-gray-700 p-4 space-y-4" style="background-color: #1f1f1f;">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-gray-400 mb-1">Total Views</p>
                            <p id="total-views" class="text-2xl font-bold" style="color: #F7931A;">0</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 mb-1">Total Button Clicks</p>
                            <p id="total-buttons" class="text-2xl font-bold" style="color: #f0f0f0;">0</p>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-700">
                        <label class="text-xs text-gray-400 mb-1 block">Period</label>
                        <select id="period-selector"
                            class="w-full px-2 py-1.5 border border-gray-700 text-sm outline-none"
                            style="background-color: #2a2a2a; color: #f0f0f0;">
                            <option value="7">Last 7 days</option>
                            <option value="30">Last 30 days</option>
                            <option value="90">Last 90 days</option>
                            <option value="all">All time</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Section: All Buttons Table -->
        <div class="border border-gray-700 p-6" style="background-color: #1f1f1f;">
            <h2 class="text-lg font-bold mb-4" style="color: #f0f0f0;">All Detected Buttons</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-700">
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-400">Button Name</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-400">Page Link</th>
                            <th class="text-right py-3 px-4 text-sm font-semibold text-gray-400">Clicks</th>
                            <th class="text-center py-3 px-4 text-sm font-semibold text-gray-400">Status</th>
                        </tr>
                    </thead>
                    <tbody id="buttons-table">
                        <tr>
                            <td colspan="4" class="text-center py-8 text-gray-500 text-sm">Loading buttons...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { firebaseConfig } from "../config/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let currentUser = null;

        // Auth check
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '../';
            } else {
                currentUser = user;
                document.getElementById('user-email').innerText = user.email;
                loadDashboardData();
            }
        });

        // Logout - redirect to https://tasu.ai
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'https://tasu.ai';
            });
        });

        // Load Dashboard Data
        async function loadDashboardData() {
            if (!currentUser) return;

            const period = document.getElementById('period-selector').value;

            try {
                const token = await currentUser.getIdToken();
                const response = await fetch(`https://api.tasu.ai/analytics.php?period=${period}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 403) {
                    await fetch('https://api.tasu.ai/register.php', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    loadDashboardData();
                    return;
                }

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                const buttons = data.buttons || [];

                // Update stats
                const totalClicks = buttons.reduce((sum, btn) => sum + btn.clicks, 0);
                const totalViewsEl = document.getElementById('total-views');
                totalViewsEl.innerText = totalClicks.toLocaleString();
                totalViewsEl.style.color = totalClicks & gt; 0 ? '#F7931A' : '#f0f0f0';
                document.getElementById('total-buttons').innerText = buttons.length;

                // Render chart
                renderDualChart(buttons, period);

                // Render table
                renderButtonsTable(buttons);
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function renderDualChart(buttons, period) {
            // Generate time-based data (mock for now - you'll need actual time series data from backend)
            const days = period === '7' ? 7 : period === '30' ? 30 : period === '90' ? 90 : 365;
            const labels = [];
            const viewsData = [];
            const clicksData = [];

            // Generate labels (reverse chronological - left is most recent)
            for (let i = days - 1; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                labels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));

                // Mock data (replace with actual API data)
                viewsData.push(Math.floor(Math.random() * 100) + 50);
                clicksData.push(Math.floor(Math.random() * 50) + 10);
            }

            // Reverse arrays so left is most recent
            labels.reverse();
            viewsData.reverse();
            clicksData.reverse();

            const ctx = document.getElementById('views-chart');
            const existingChart = Chart.getChart(ctx);
            if (existingChart) existingChart.destroy();

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: 'Views',
                            data: viewsData,
                            borderColor: '#F7931A',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            type: 'bar',
                            label: 'Clicks',
                            data: clicksData,
                            backgroundColor: '#8B000080',
                            borderColor: '#8B0000',
                            borderWidth: 1,
                            yAxisID: 'y'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: { color: '#f0f0f0' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#3a3a3a' },
                            ticks: { color: '#f0f0f0' }
                        },
                        y: {
                            grid: { color: '#3a3a3a' },
                            ticks: { color: '#f0f0f0' }
                        }
                    }
                }
            });
        }

        function renderButtonsTable(buttons) {
            const tbody = document.getElementById('buttons-table');
            if (!buttons.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-gray-500 text-sm">No buttons detected yet.</td></tr>';
                return;
            }

            buttons.sort((a, b) => b.clicks - a.clicks);

            tbody.innerHTML = buttons.map((btn, idx) => `
                <tr class="border-b border-gray-800 hover:bg-gray-900 transition-colors">
                    <td class="py-3 px-4 text-sm font-mono" style="color: #f0f0f0;">${btn.name || btn.selector}</td>
                    <td class="py-3 px-4 text-sm text-gray-400 truncate max-w-xs">${btn.page || 'Unknown'}</td>
                    <td class="py-3 px-4 text-sm text-right font-bold" style="color: #F7931A;">${btn.clicks}</td>
                    <td class="py-3 px-4 text-center">
                        <select class="px-2 py-1 text-xs border border-gray-700 status-selector" data-button-id="${idx}" style="background-color: #2a2a2a; color: #f0f0f0;">
                            <option value="neutral" selected>⚪ Neutral</option>
                            <option value="essential">🟢 Essential</option>
                            <option value="used">🔵 Used</option>
                            <option value="flagged">🔴 Flagged</option>
                        </select>
                    </td>
                </tr>
            `).join('');

            // Add event listeners to status selectors
            document.querySelectorAll('.status-selector').forEach(select => {
                select.addEventListener('change', (e) => {
                    console.log('Status changed for button:', e.target.dataset.buttonId, 'to:', e.target.value);
                    // You can save this to backend here
                });
            });
        }

        // Period selector change
        document.getElementById('period-selector').addEventListener('change', loadDashboardData);
    </script>

    <!-- Tasu SDK -->
    <script src="../sdk/tasu-sdk.js"></script>
</body>

</html>
